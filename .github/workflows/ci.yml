name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Run Unified Quality Gate
        run: ./scripts/quality_gate.sh

  native-quality-gate:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # WHY maxAvailableXcodeVersion: runners ship multiple Xcode versions. Pinning
      # a hard-coded path (e.g. /Applications/Xcode_16.4.app) breaks when the runner
      # image updates. maxAvailableXcodeVersion always picks the newest stable Xcode
      # that the runner image has installed, without requiring a path assumption.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen + xcodeproj gem
        run: |
          brew install xcodegen
          gem install xcodeproj --no-document --user-install 2>/dev/null \
            || gem install xcodeproj --no-document

      - name: Run Native Quality Gate
        run: ./Scripts/native_quality_gate.sh
