name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Run Unified Quality Gate
        run: ./scripts/quality_gate.sh

  native-quality-gate:
    runs-on: macos-15
    env:
      # Pin to Xcode 26 (iOS 26 SDK). Update this when a new Xcode ships.
      # macOS 15 runners ship Xcode 26 betas and latest stable Xcode 16.x.
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        # Pin xcodegen to avoid a broken HEAD breaking CI.
        run: brew install xcodegen

      - name: Run Native Quality Gate
        run: ./Scripts/native_quality_gate.sh
