  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="176" stroke="rgba(17,17,17,0.10)" stroke-width="2"/>
  <circle cx="330" cy="286" r="174" fill="url(#glow)"/>

