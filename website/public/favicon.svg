<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="512" y1="96" x2="512" y2="864" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E55A34"/>
      <stop offset="0.72" stop-color="#E7FBEF"/>
      <stop offset="1" stop-color="#D9F4E7"/>
